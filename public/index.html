<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏆 Kronometre Turnuva</title>
    <style>
        :root { --gold: #f9d423; --red: #f83600; --green: #4ade80; --text: #e0e0e0; --text2: #a0a8c0; --radius: 16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:#0a0f1e; min-height:100dvh; color:var(--text); display:flex; justify-content:center; align-items:flex-start; padding:10px; -webkit-tap-highlight-color:transparent; user-select:none; touch-action:manipulation; }
        .container { max-width:520px; width:100%; background:rgba(20,25,40,0.95); border-radius:24px; padding:20px; border:1px solid rgba(255,255,255,0.08); margin:10px 0; }
        h1 { text-align:center; font-size:2rem; background:linear-gradient(135deg,#f9d423,#f83600); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .screen { display:none; }
        .screen.active { display:block; }
        input,button { width:100%; padding:14px; margin:6px 0; border-radius:var(--radius); border:1px solid rgba(255,255,255,0.15); background:rgba(15,20,35,0.9); color:white; font-size:1rem; }
        button { background:linear-gradient(135deg,#f83600,#f9d423); color:#000; font-weight:700; cursor:pointer; border:none; }
        .code-display { font-size:2.5rem; text-align:center; font-weight:900; color:var(--gold); letter-spacing:6px; background:rgba(0,0,0,0.5); padding:15px; border-radius:20px; margin:10px 0; }
        .player-item { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(255,255,255,0.06); }
        .host-badge { background:var(--gold); color:#000; padding:3px 8px; border-radius:12px; font-size:0.7rem; }
        .timer-display { font-size:4.5rem; font-weight:900; color:var(--gold); text-align:center; margin:10px 0; }
        .timer-display.running { color:var(--green); }
        .countdown-display { font-size:6rem; font-weight:900; text-align:center; animation:pulse 0.4s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
        .stop-btn { background:#ff4444!important; color:white!important; font-size:1.5rem!important; padding:20px!important; }
        .vs-display { display:flex; justify-content:center; gap:15px; font-size:1.3rem; font-weight:700; padding:15px; background:rgba(0,0,0,0.3); border-radius:var(--radius); }
        .vs-text { color:var(--red); font-size:1.8rem; font-weight:900; }
        .result-display { text-align:center; font-size:1.3rem; padding:15px; background:rgba(249,212,35,0.1); border-radius:var(--radius); margin:10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Kronometre Turnuva</h1>
        
        <div id="menuScreen" class="screen active">
            <input type="text" id="playerNameInput" placeholder="İsminizi girin" maxlength="20">
            <button onclick="createRoom()">🏠 Oda Oluştur</button>
            <div style="text-align:center;margin:10px;color:#888">— veya —</div>
            <input type="text" id="roomCodeInput" placeholder="Oda kodu" maxlength="6" style="text-transform:uppercase;text-align:center;letter-spacing:4px;font-size:1.3rem">
            <button onclick="joinRoom()">🚪 Odaya Katıl</button>
        </div>

        <div id="lobbyScreen" class="screen">
            <div class="code-display" id="roomCodeDisplay">------</div>
            <span class="host-badge" id="hostBadge" style="display:none">👑 Oda Sahibi</span>
            <div id="playerList" style="max-height:200px;overflow-y:auto;margin:10px 0"></div>
            <button onclick="startTournament()" id="startBtn" style="display:none">🚀 Oyunu Başlat</button>
            <button onclick="leaveRoom()" style="background:rgba(255,255,255,0.1);color:white;margin-top:10px">🚪 Ayrıl</button>
        </div>

        <div id="matchScreen" class="screen">
            <div id="countdownDisplay" class="countdown-display" style="display:none"></div>
            <div id="matchInfo" style="text-align:center;font-weight:700;color:var(--gold)"></div>
            <div class="vs-display"><span id="p1name">---</span><span class="vs-text">VS</span><span id="p2name">---</span></div>
            <div style="text-align:center;color:#888">🎯 Hedef: <span id="targetDisplay" style="color:var(--gold);font-weight:700">--</span> s</div>
            <div class="timer-display" id="timerDisplay">0.00</div>
            <button class="stop-btn" id="stopButton" onpointerdown="stopTimer()" style="display:none">DURDUR!</button>
            <div id="resultDisplay" class="result-display" style="display:none"></div>
        </div>

        <div id="waitingScreen" class="screen">
            <div style="text-align:center;padding:40px"><h3>⏳ Bekleyin</h3><p id="waitingMsg"></p></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let playerName = '', roomCode = '', isHost = false;
        let timerInterval = null, timerStartTime = 0, timerStarted = false, myResult = false;

        function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
        function fmtTimer(ms){return(ms/1000).toFixed(2);}

        function createRoom(){
            playerName=document.getElementById('playerNameInput').value.trim();
            if(!playerName)return alert('İsim girin!');
            socket.emit('createRoom',{playerName,settings:{maxPlayers:10,useDecimal:true,timerMin:5,timerMax:20}});
        }
        function joinRoom(){
            playerName=document.getElementById('playerNameInput').value.trim();
            const code=document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if(!playerName||!code)return alert('İsim ve kod girin!');
            socket.emit('joinRoom',{code,playerName});
        }
        function startTournament(){socket.emit('startTournament');}
        function leaveRoom(){location.reload();}

        socket.on('roomCreated',(data)=>{
            roomCode=data.code;isHost=true;
            document.getElementById('roomCodeDisplay').textContent=roomCode;
            document.getElementById('hostBadge').style.display='inline-block';
            document.getElementById('startBtn').style.display='block';
            updatePlayers(data.players);showScreen('lobbyScreen');
        });
        socket.on('joinSuccess',(data)=>{
            roomCode=data.code;
            document.getElementById('roomCodeDisplay').textContent=roomCode;
            updatePlayers(data.players);showScreen('lobbyScreen');
        });
        socket.on('playerJoined',(p)=>updatePlayers(p));
        socket.on('playerLeft',(p)=>updatePlayers(p));
        socket.on('roomClosed',(d)=>{alert(d.message);location.reload();});

        // EN ÖNEMLİ DÜZELTME: AYRI AYRI EVENT'LER
        socket.on('matchScreenShow',(state)=>{
            document.getElementById('matchInfo').textContent=state.roundName;
            document.getElementById('p1name').textContent=state.currentPlayers[0];
            document.getElementById('p2name').textContent=state.currentPlayers[1];
            document.getElementById('targetDisplay').textContent=fmtTimer(state.targetTime);
            document.getElementById('timerDisplay').textContent='0.00';
            document.getElementById('timerDisplay').classList.remove('running');
            document.getElementById('stopButton').style.display='none';
            document.getElementById('countdownDisplay').style.display='none';
            document.getElementById('resultDisplay').style.display='none';
            showScreen('matchScreen');
        });

        socket.on('waitingScreenShow',(data)=>{
            document.getElementById('waitingMsg').textContent=data.players[0]+' VS '+data.players[1];
            showScreen('waitingScreen');
        });

        socket.on('countdown',(data)=>{
            const cd=document.getElementById('countdownDisplay');
            cd.style.display='block';
            if(data.count==='BAŞLA!'){cd.textContent='BAŞLA!';cd.style.color='#4ade80';setTimeout(()=>cd.style.display='none',200);}
            else{cd.textContent=data.count;cd.style.color='#ff4444';}
        });

        socket.on('timerStarted',(data)=>{
            timerStartTime=data.startTime;timerStarted=true;myResult=false;
            document.getElementById('stopButton').style.display='block';
            document.getElementById('timerDisplay').classList.add('running');
            document.getElementById('countdownDisplay').style.display='none';
            clearInterval(timerInterval);
            timerInterval=setInterval(()=>{
                document.getElementById('timerDisplay').textContent=fmtTimer(Math.max(0,Date.now()-timerStartTime));
            },10);
        });

        function stopTimer(){
            if(myResult||!timerStarted)return;
            myResult=true;timerStarted=false;clearInterval(timerInterval);
            document.getElementById('timerDisplay').classList.remove('running');
            document.getElementById('stopButton').style.display='none';
            document.getElementById('resultDisplay').style.display='block';
            document.getElementById('resultDisplay').innerHTML='⏳ Bekleniyor...';
            socket.emit('stopTimer',{stopTime:Date.now()});
        }

        socket.on('roundResult',(result)=>{
            document.getElementById('resultDisplay').innerHTML='🏆 '+result.winner+' kazandı!';
        });

        socket.on('championDeclared',(data)=>{
            clearInterval(timerInterval);
            showScreen('matchScreen');
            document.getElementById('matchInfo').textContent='👑 ŞAMPİYON!';
            document.getElementById('p1name').textContent=data.champion;
            document.getElementById('p2name').textContent='🏆';
            document.getElementById('timerDisplay').textContent='👑';
            document.getElementById('stopButton').style.display='none';
            document.getElementById('resultDisplay').innerHTML='<b>'+data.champion+'</b> ŞAMPİYON!';
        });

        socket.on('gameForceEnd',(d)=>{alert(d.message);location.reload();});

        function updatePlayers(pl){
            document.getElementById('playerList').innerHTML=pl.map(p=>`<div class="player-item"><span>${p.name}${p.isHost?' 👑':''}</span></div>`).join('');
            document.getElementById('startBtn').style.display=isHost&&pl.length>=3?'block':'none';
        }

        document.getElementById('chatInput')?.addEventListener('keypress',(e)=>{if(e.key==='Enter')sendMessage();});
        function sendMessage(){const i=document.getElementById('chatInput');if(i&&i.value.trim()){socket.emit('sendMessage',{message:i.value.trim()});i.value='';}}
        socket.on('newMessage',(d)=>{const b=document.getElementById('lobbyChat');if(b)b.innerHTML+=`<div><b>${d.player}:</b> ${d.message}</div>`;});
    </script>
</body>
</html>
