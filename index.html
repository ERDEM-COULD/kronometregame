<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>🏆 Şampiyonlar Ligi Turnuvası</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 50%, #0d1117 100%);
            min-height: 100vh;
            padding: 10px;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(20, 25, 40, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            margin: 10px 0;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #f9d423, #f83600, #f9d423);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #8892b0;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .stars {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #f9d423;
        }

        .section {
            background: rgba(30, 35, 50, 0.6);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input {
            flex: 1;
            background: rgba(15, 20, 30, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #f9d423;
            box-shadow: 0 0 15px rgba(249, 212, 35, 0.2);
        }

        button {
            background: linear-gradient(135deg, #f83600, #f9d423);
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            color: #0a0f1e;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(248, 54, 0, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        button.secondary {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: none;
            font-size: 0.8rem;
            padding: 10px 15px;
        }

        button.danger {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.3);
            color: #ff6b6b;
            box-shadow: none;
            font-size: 0.7rem;
            padding: 6px 12px;
            margin-top: 5px;
        }

        button:disabled {
            opacity: 0.4;
            transform: none;
            pointer-events: none;
        }

        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .player-tag {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .player-tag span {
            color: #f9d423;
            font-weight: bold;
        }

        .remove-player {
            background: rgba(255,80,80,0.3);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            box-shadow: none;
        }

        .current-match {
            background: linear-gradient(135deg, rgba(249, 212, 35, 0.1), rgba(248, 54, 0, 0.1));
            border: 1px solid rgba(249, 212, 35, 0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
            transition: all 0.3s;
        }

        .super-final {
            border: 2px solid gold !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3) !important;
            animation: superGlow 1.5s infinite;
        }

        @keyframes superGlow {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        }

        .versus {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 1.4rem;
            font-weight: bold;
            flex-wrap: wrap;
        }

        .player-card {
            background: rgba(15, 20, 30, 0.9);
            border-radius: 16px;
            padding: 12px 20px;
            min-width: 100px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 1.1rem;
            word-break: break-word;
        }

        .vs-text {
            color: #f83600;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .timer-info {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #8892b0;
            background: rgba(0,0,0,0.4);
            padding: 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .timer-seconds {
            font-size: 2rem;
            font-weight: bold;
            color: #f9d423;
            display: block;
        }

        .winner-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .winner-btn {
            flex: 1;
            min-width: 110px;
            padding: 15px;
            font-size: 1rem;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .winner-btn:hover {
            border-color: #f9d423;
            background: rgba(249, 212, 35, 0.1);
        }

        .bracket-info {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #a8b2d1;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
        }

        .champions-section {
            background: rgba(249, 212, 35, 0.05);
            border: 1px solid rgba(249, 212, 35, 0.2);
            border-radius: 16px;
            padding: 15px;
            margin-top: 15px;
        }

        .champion-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .champion-badge {
            background: linear-gradient(135deg, #f9d423, #f83600);
            color: #0a0f1e;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(249, 212, 35, 0.3);
        }

        .trophy {
            font-size: 1.2rem;
        }

        .grand-champion {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            font-size: 1.2rem;
            padding: 12px 20px;
            border-radius: 25px;
            animation: glow 2s infinite;
            text-align: center;
            font-weight: 900;
            margin-top: 10px;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 15px gold; }
            50% { box-shadow: 0 0 35px orange; }
            100% { box-shadow: 0 0 15px gold; }
        }

        .match-history {
            font-size: 0.8rem;
            color: #8892b0;
            margin-top: 10px;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .match-history-item {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .flow-chart {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #a8b2d1;
            text-align: center;
            line-height: 1.8;
        }

        .save-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .header-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Şampiyonlar Ligi</h1>
        <div class="subtitle">TURNUVASI <span class="save-indicator" id="saveIndicator" title="Otomatik kaydediliyor"></span></div>
        <div class="stars">⭐ ⭐ ⭐</div>

        <!-- Oyuncu Ekleme -->
        <div class="section" id="addPlayerSection">
            <div class="input-group">
                <input type="text" id="playerNameInput" placeholder="Oyuncu adı yaz..." autocomplete="off">
                <button onclick="addPlayer()">➕ Ekle</button>
            </div>
            <div class="player-list" id="playerList"></div>
            <button onclick="startTournament()" id="startBtn" disabled style="width:100%;">🚀 TURNUVA BAŞLAT</button>
            <p style="font-size:0.75rem; color:#8892b0; text-align:center; margin-top:8px;">En az 3 oyuncu ekleyin • Çift Eleme Sistemi</p>
            <div class="header-buttons">
                <button onclick="resetAllData()" class="danger">🗑️ Tüm Verileri Sil</button>
            </div>
        </div>

        <!-- Aktif Maç -->
        <div class="section" id="matchSection" style="display: none;">
            <div style="text-align:center; color:#f9d423; font-weight:bold; margin-bottom:5px;" id="roundInfo"></div>
            <div class="current-match" id="matchBox">
                <div class="versus" id="versusDisplay">
                    <div class="player-card" id="player1Card">Oyuncu 1</div>
                    <div class="vs-text">VS</div>
                    <div class="player-card" id="player2Card">Oyuncu 2</div>
                </div>
                <div class="timer-info">
                    ⏱️ Kronometre Süresi
                    <span class="timer-seconds" id="timerDisplay">--</span>
                    <span style="font-size:0.8rem;">saniye</span>
                </div>
                <div class="winner-buttons">
                    <button class="winner-btn" id="btnWinner1" onclick="selectWinner(1)">🏅 Kazandı</button>
                    <button class="winner-btn" id="btnWinner2" onclick="selectWinner(2)">🏅 Kazandı</button>
                </div>
            </div>
            <div class="bracket-info" id="bracketStatus"></div>
            <div class="flow-chart" id="flowChart"></div>
            <div class="match-history" id="matchHistory"></div>
            <button onclick="abortTournament()" class="secondary" style="width:100%; margin-top:10px;">❌ Turnuvayı İptal Et</button>
        </div>

        <!-- Şampiyonlar Paneli -->
        <div class="champions-section" id="championsPanel" style="display: none;">
            <div style="font-weight:bold; margin-bottom:5px;">🏆 ŞAMPİYONLAR LİGİ KAZANANLARI</div>
            <div class="champion-list" id="championList"></div>
            <button onclick="resetFullGame()" class="secondary" style="width:100%; margin-top:10px;">🔄 Yeni Oyun Başlat</button>
        </div>

        <div id="grandChampionArea" style="text-align:center;"></div>
    </div>

    <script>
        // LocalStorage anahtarı
        const STORAGE_KEY = 'sampiyonlar_ligi_data';

        // Tüm durum değişkenleri
        let players = [];
        let tournamentActive = false;
        let currentMatch = null;
        let waitingPlayer = null;
        let match1Winner = null, match1Loser = null;
        let match2Winner = null, match2Loser = null;
        let match3Winner = null, match3Loser = null;
        let match4Winner = null, match4Loser = null;
        let superFinalWinner = null;
        let currentTimerSeconds = 0;
        let champions = {};
        let gameOver = false;
        let matchHistory = [];
        let tournamentStep = 0;

        // Sayfa yüklendiğinde verileri geri yükle
        function loadFromStorage() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    players = data.players || [];
                    tournamentActive = data.tournamentActive || false;
                    currentMatch = data.currentMatch || null;
                    waitingPlayer = data.waitingPlayer || null;
                    match1Winner = data.match1Winner || null;
                    match1Loser = data.match1Loser || null;
                    match2Winner = data.match2Winner || null;
                    match2Loser = data.match2Loser || null;
                    match3Winner = data.match3Winner || null;
                    match3Loser = data.match3Loser || null;
                    match4Winner = data.match4Winner || null;
                    match4Loser = data.match4Loser || null;
                    superFinalWinner = data.superFinalWinner || null;
                    currentTimerSeconds = data.currentTimerSeconds || 0;
                    champions = data.champions || {};
                    gameOver = data.gameOver || false;
                    matchHistory = data.matchHistory || [];
                    tournamentStep = data.tournamentStep || 0;
                    return true;
                }
            } catch (e) {
                console.error('Veri yüklenemedi:', e);
            }
            return false;
        }

        // Tüm durumu localStorage'a kaydet
        function saveToStorage() {
            try {
                const data = {
                    players,
                    tournamentActive,
                    currentMatch,
                    waitingPlayer,
                    match1Winner,
                    match1Loser,
                    match2Winner,
                    match2Loser,
                    match3Winner,
                    match3Loser,
                    match4Winner,
                    match4Loser,
                    superFinalWinner,
                    currentTimerSeconds,
                    champions,
                    gameOver,
                    matchHistory,
                    tournamentStep
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                
                // Kaydetme göstergesini animasyonla
                const indicator = document.getElementById('saveIndicator');
                if (indicator) {
                    indicator.style.background = '#4ade80';
                    setTimeout(() => {
                        indicator.style.background = '#4ade80';
                    }, 100);
                }
            } catch (e) {
                console.error('Veri kaydedilemedi:', e);
            }
        }

        // Tüm verileri sil
        function resetAllData() {
            if (confirm('TÜM VERİLER SİLİNECEK!\n\nOyuncular, şampiyonluklar ve turnuva geçmişi kalıcı olarak silinecek. Emin misiniz?')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // Sayfa yenilendiğinde durumu geri yükle
        function restoreState() {
            if (!loadFromStorage()) {
                // İlk kez açılıyor, varsayılan değerler
                players = [];
                tournamentActive = false;
                gameOver = false;
                champions = {};
                matchHistory = [];
                tournamentStep = 0;
            }

            updatePlayerListUI();
            updateChampionsUI();
            updateMatchHistoryUI();

            // Turnuva aktifse arayüzü göster
            if (tournamentActive && !gameOver) {
                document.getElementById('addPlayerSection').style.display = 'none';
                document.getElementById('matchSection').style.display = 'block';
                document.getElementById('championsPanel').style.display = 'block';
                
                if (currentMatch) {
                    updateFlowChart();
                    loadCurrentMatch();
                }
            } else if (gameOver) {
                document.getElementById('addPlayerSection').style.display = 'block';
                document.getElementById('matchSection').style.display = 'none';
                document.getElementById('championsPanel').style.display = 'block';
                
                if (Object.keys(champions).length > 0) {
                    const lastChampion = Object.entries(champions).sort((a,b) => b[1] - a[1])[0];
                    if (lastChampion && champions[lastChampion[0]] >= 5) {
                        document.getElementById('grandChampionArea').innerHTML = 
                            `<div class="grand-champion">👑 ${lastChampion[0]} 5 KEZ ŞAMPİYON! OYUN BİTTİ 👑</div>`;
                    }
                }
            } else {
                document.getElementById('addPlayerSection').style.display = 'block';
                document.getElementById('matchSection').style.display = 'none';
                if (Object.keys(champions).length > 0) {
                    document.getElementById('championsPanel').style.display = 'block';
                }
            }

            document.getElementById('startBtn').disabled = players.length < 3;
        }

        function updatePlayerListUI() {
            const container = document.getElementById('playerList');
            container.innerHTML = players.map((p, i) => 
                `<div class="player-tag"><span>${i+1}.</span> ${p} <button class="remove-player" onclick="removePlayer(${i})">✕</button></div>`
            ).join('');
            document.getElementById('startBtn').disabled = players.length < 3 || tournamentActive;
            saveToStorage();
        }

        function addPlayer() {
            if (tournamentActive) return;
            const input = document.getElementById('playerNameInput');
            const name = input.value.trim();
            if (!name) return;
            if (players.includes(name)) {
                alert('Bu isim zaten eklenmiş!');
                return;
            }
            players.push(name);
            input.value = '';
            updatePlayerListUI();
            input.focus();
        }

        function removePlayer(index) {
            if (tournamentActive) return;
            players.splice(index, 1);
            updatePlayerListUI();
        }

        document.getElementById('playerNameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addPlayer();
        });

        function generateRandomTimer() {
            return Math.floor(Math.random() * 16) + 5;
        }

        function addMatchHistory(p1, p2, winner, matchType) {
            matchHistory.unshift({ player1: p1, player2: p2, winner: winner, type: matchType });
            if (matchHistory.length > 20) matchHistory.pop();
            updateMatchHistoryUI();
            saveToStorage();
        }

        function updateMatchHistoryUI() {
            const container = document.getElementById('matchHistory');
            if (container) {
                container.innerHTML = matchHistory.map(m => 
                    `<div class="match-history-item">${m.player1} vs ${m.player2} → <strong>${m.winner}</strong> (${m.type})</div>`
                ).join('');
            }
        }

        function updateFlowChart() {
            const chart = document.getElementById('flowChart');
            if (!chart) return;
            
            let html = '📋 TURNUVA AKIŞI:<br><br>';
            
            if (tournamentStep === 1) {
                html += `🔵 <b>1. MAÇ:</b> ${currentMatch.player1} vs ${currentMatch.player2}<br>`;
                html += `⏳ Bekleyen: <b>${waitingPlayer}</b><br>`;
                html += `<small>Kazanan → 3. Maça | Kaybeden → 2. Maça</small>`;
            } else if (tournamentStep === 2) {
                html += `✅ 1. Maç: <b>${match1Winner}</b> kazandı (3. Maça)<br>`;
                html += `🔵 <b>2. MAÇ:</b> ${match1Loser} vs ${waitingPlayer}<br>`;
                html += `<small>Kazanan → 3. Maça | Kaybeden → 4. Maça</small>`;
            } else if (tournamentStep === 3) {
                html += `✅ 1. Maç: <b>${match1Winner}</b> kazandı<br>`;
                html += `✅ 2. Maç: <b>${match2Winner}</b> kazandı<br>`;
                html += `🔵 <b>3. MAÇ (Ara Final):</b> ${match1Winner} vs ${match2Winner}<br>`;
                html += `<small>Kazanan → Süper Finale | Kaybeden → 4. Maça</small>`;
            } else if (tournamentStep === 4) {
                html += `✅ 1. Maç: <b>${match1Winner}</b> kazandı<br>`;
                html += `✅ 2. Maç: <b>${match2Winner}</b> kazandı<br>`;
                html += `✅ 3. Maç: <b>${match3Winner}</b> kazandı (Süper Finalde)<br>`;
                html += `🔵 <b>4. MAÇ (Kaybedenler Finali):</b> ${match2Loser} vs ${match3Loser}<br>`;
                html += `<small>Kazanan → Süper Finale</small>`;
            } else if (tournamentStep === 5) {
                html += `✅ 3. Maç Kazananı: <b>${match3Winner}</b><br>`;
                html += `✅ 4. Maç Kazananı: <b>${match4Winner}</b><br>`;
                html += `⭐ <b>5. MAÇ (SÜPER FİNAL):</b> ${match3Winner} vs ${match4Winner}<br>`;
                html += `<small>🏆 Kazanan ŞAMPİYON olacak!</small>`;
            }
            
            chart.innerHTML = html;
        }

        function startTournament() {
            if (players.length < 3) return;
            tournamentActive = true;
            gameOver = false;
            matchHistory = [];
            tournamentStep = 1;
            
            match1Winner = match1Loser = null;
            match2Winner = match2Loser = null;
            match3Winner = match3Loser = null;
            match4Winner = match4Loser = null;
            superFinalWinner = null;
            
            document.getElementById('addPlayerSection').style.display = 'none';
            document.getElementById('matchSection').style.display = 'block';
            document.getElementById('championsPanel').style.display = 'block';
            document.getElementById('matchBox').classList.remove('super-final');
            document.getElementById('grandChampionArea').innerHTML = '';
            updateMatchHistoryUI();
            
            let shuffled = [...players].sort(() => Math.random() - 0.5);
            let p1 = shuffled[0];
            let p2 = shuffled[1];
            waitingPlayer = shuffled[2];
            
            currentMatch = {
                player1: p1,
                player2: p2,
                matchType: '1. MAÇ'
            };
            
            saveToStorage();
            updateFlowChart();
            loadCurrentMatch();
        }

        function loadCurrentMatch() {
            if (gameOver || !currentMatch) return;
            
            document.getElementById('player1Card').textContent = currentMatch.player1;
            document.getElementById('player2Card').textContent = currentMatch.player2;
            document.getElementById('btnWinner1').style.display = 'block';
            document.getElementById('btnWinner2').style.display = 'block';
            
            // Eğer timer daha önce oluşturulmamışsa oluştur
            if (!currentTimerSeconds || currentTimerSeconds === 0) {
                currentTimerSeconds = generateRandomTimer();
            }
            document.getElementById('timerDisplay').textContent = currentTimerSeconds;
            
            let info = '';
            if (tournamentStep === 1) info = '🥊 1. MAÇ';
            else if (tournamentStep === 2) info = '🥊 2. MAÇ';
            else if (tournamentStep === 3) info = '🔥 3. MAÇ (Ara Final)';
            else if (tournamentStep === 4) info = '🥉 4. MAÇ (Kaybedenler Finali)';
            else if (tournamentStep === 5) {
                info = '⭐ 5. MAÇ (SÜPER FİNAL) ⭐';
                document.getElementById('matchBox').classList.add('super-final');
            }
            document.getElementById('roundInfo').textContent = info;
            
            let status = '';
            if (tournamentStep === 1) {
                status = `⏳ ${waitingPlayer} bekliyor | Kazanan 3. maça, kaybeden 2. maça`;
            } else if (tournamentStep === 2) {
                status = `${match1Winner} 3. maçı bekliyor | Bu maçın kazananı da 3. maça çıkacak`;
            } else if (tournamentStep === 3) {
                status = `Kazanan direkt Süper Finale! Kaybeden 4. maça gidecek`;
            } else if (tournamentStep === 4) {
                status = `${match3Winner} Süper Finalde bekliyor | Bu maçın kazananı Süper Finale çıkacak`;
            } else if (tournamentStep === 5) {
                status = `🏆 KAZANAN ŞAMPİYON OLACAK! 🏆`;
            }
            document.getElementById('bracketStatus').textContent = status;
            
            saveToStorage();
        }

        function selectWinner(winnerIndex) {
            if (gameOver || !currentMatch) return;
            
            const winner = winnerIndex === 1 ? currentMatch.player1 : currentMatch.player2;
            const loser = winnerIndex === 1 ? currentMatch.player2 : currentMatch.player1;
            
            addMatchHistory(currentMatch.player1, currentMatch.player2, winner, currentMatch.matchType);
            
            // Yeni maç için timer'ı sıfırla
            currentTimerSeconds = 0;
            
            if (tournamentStep === 1) {
                match1Winner = winner;
                match1Loser = loser;
                
                tournamentStep = 2;
                currentMatch = {
                    player1: match1Loser,
                    player2: waitingPlayer,
                    matchType: '2. MAÇ'
                };
                waitingPlayer = null;
                updateFlowChart();
                loadCurrentMatch();
                
            } else if (tournamentStep === 2) {
                match2Winner = winner;
                match2Loser = loser;
                
                tournamentStep = 3;
                currentMatch = {
                    player1: match1Winner,
                    player2: match2Winner,
                    matchType: '3. MAÇ (Ara Final)'
                };
                updateFlowChart();
                loadCurrentMatch();
                
            } else if (tournamentStep === 3) {
                match3Winner = winner;
                match3Loser = loser;
                
                tournamentStep = 4;
                currentMatch = {
                    player1: match2Loser,
                    player2: match3Loser,
                    matchType: '4. MAÇ (Kaybedenler Finali)'
                };
                updateFlowChart();
                loadCurrentMatch();
                
            } else if (tournamentStep === 4) {
                match4Winner = winner;
                match4Loser = loser;
                
                tournamentStep = 5;
                currentMatch = {
                    player1: match3Winner,
                    player2: match4Winner,
                    matchType: '⭐ 5. MAÇ (SÜPER FİNAL)'
                };
                updateFlowChart();
                loadCurrentMatch();
                
            } else if (tournamentStep === 5) {
                superFinalWinner = winner;
                declareChampion(superFinalWinner);
            }
        }

        function abortTournament() {
            if (confirm('Turnuvayı iptal etmek istediğinize emin misiniz? İlerleme kaydedilmeyecek.')) {
                tournamentActive = false;
                gameOver = false;
                currentMatch = null;
                waitingPlayer = null;
                match1Winner = match1Loser = null;
                match2Winner = match2Loser = null;
                match3Winner = match3Loser = null;
                match4Winner = match4Loser = null;
                superFinalWinner = null;
                currentTimerSeconds = 0;
                matchHistory = [];
                tournamentStep = 0;
                
                document.getElementById('matchSection').style.display = 'none';
                document.getElementById('addPlayerSection').style.display = 'block';
                document.getElementById('grandChampionArea').innerHTML = '';
                document.getElementById('matchBox').classList.remove('super-final');
                document.getElementById('startBtn').disabled = players.length < 3;
                
                saveToStorage();
            }
        }

        function declareChampion(playerName) {
            gameOver = true;
            document.getElementById('matchSection').style.display = 'none';
            document.getElementById('matchBox').classList.remove('super-final');
            
            champions[playerName] = (champions[playerName] || 0) + 1;
            updateChampionsUI();
            
            if (champions[playerName] >= 5) {
                document.getElementById('grandChampionArea').innerHTML = 
                    `<div class="grand-champion">👑 ${playerName} 5 KEZ ŞAMPİYON! OYUN BİTTİ 👑</div>`;
            } else {
                document.getElementById('grandChampionArea').innerHTML = 
                    `<div style="color:#f9d423; font-weight:bold; margin:10px 0;">🎉 ${playerName} bu turun şampiyonu! (${champions[playerName]}/5)</div>`;
            }
            
            document.getElementById('addPlayerSection').style.display = 'block';
            document.getElementById('startBtn').disabled = false;
            tournamentActive = false;
            currentTimerSeconds = 0;
            
            saveToStorage();
        }

        function updateChampionsUI() {
            const list = document.getElementById('championList');
            if (!list) return;
            
            let html = '';
            const sorted = Object.entries(champions).sort((a, b) => b[1] - a[1]);
            for (let [name, count] of sorted) {
                html += `<div class="champion-badge"><span class="trophy">🏆</span> ${name} x${count}</div>`;
            }
            if (!html) html = '<span style="color:#8892b0;">Henüz şampiyon yok</span>';
            list.innerHTML = html;
            
            if (Object.keys(champions).length > 0) {
                document.getElementById('championsPanel').style.display = 'block';
            }
        }

        function resetFullGame() {
            if (Object.values(champions).some(c => c >= 5)) {
                if (confirm('Büyük şampiyon belirlendi! Tüm verileri sıfırlamak istiyor musunuz?')) {
                    localStorage.removeItem(STORAGE_KEY);
                    location.reload();
                }
                return;
            }
            
            tournamentActive = false;
            gameOver = false;
            currentMatch = null;
            waitingPlayer = null;
            match1Winner = match1Loser = null;
            match2Winner = match2Loser = null;
            match3Winner = match3Loser = null;
            match4Winner = match4Loser = null;
            superFinalWinner = null;
            currentTimerSeconds = 0;
            matchHistory = [];
            tournamentStep = 0;
            
            document.getElementById('matchSection').style.display = 'none';
            document.getElementById('addPlayerSection').style.display = 'block';
            document.getElementById('grandChampionArea').innerHTML = '';
            document.getElementById('matchBox').classList.remove('super-final');
            document.getElementById('startBtn').disabled = players.length < 3;
            
            saveToStorage();
        }

        // Sayfa kapanırken veya yenilenirken kaydet
        window.addEventListener('beforeunload', () => {
            saveToStorage();
        });

        // Periyodik kaydetme (her 5 saniyede bir)
        setInterval(() => {
            if (tournamentActive || Object.keys(champions).length > 0) {
                saveToStorage();
            }
        }, 5000);

        // Sayfa yüklendiğinde durumu geri yükle
        restoreState();
    </script>
</body>
</html>
